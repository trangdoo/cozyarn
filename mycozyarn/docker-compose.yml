# CozyYarn — local/production stack.
# Usage:
#   docker compose up -d --build
#   docker compose exec app php artisan migrate --seed
#   docker compose exec app php artisan storage:link
#
# Truy cập:  http://localhost:8080

name: cozyarn

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cozyarn:latest
    container_name: cozyarn_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks: [cozyarn-net]

  web:
    image: nginx:1.27-alpine
    container_name: cozyarn_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [cozyarn-net]

  db:
    image: mysql:8.0
    container_name: cozyarn_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-cozyarn}
      MYSQL_USER:          ${DB_USERNAME:-cozyarn}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - cozyarn-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [cozyarn-net]

volumes:
  cozyarn-db:

networks:
  cozyarn-net:
    driver: bridge
