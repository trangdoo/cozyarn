# Nginx vhost cho Laravel — đặt vào /etc/nginx/conf.d/default.conf trong container web.
# PHP request → forward sang container app (php-fpm) qua TCP 9000.

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Logs ra stdout/stderr (Docker friendly)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    client_max_body_size 64M;

    # Static files (Vite build, ảnh, theme CSS) — trả về trực tiếp với cache dài.
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|woff2?|ttf|eot|ico|mp4|webm)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120s;
    }

    # Chặn truy cập file ẩn / nhạy cảm
    location ~ /\.(?!well-known).* {
        deny all;
    }
    location ~ ^/(\.env|composer\.(json|lock)|artisan|VERSION|CHANGELOG\.md)$ {
        deny all;
    }
}
